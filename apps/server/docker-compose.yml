# Production compose for the Hetzner box (159.69.91.90).
# Run from the repo root:  docker compose -f apps/server/docker-compose.yml up -d --build

name: riskrask

services:
  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    container_name: riskrask-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8787:8787"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  caddy:
    image: caddy:2-alpine
    container_name: riskrask-caddy
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

volumes:
  caddy_data:
  caddy_config:
